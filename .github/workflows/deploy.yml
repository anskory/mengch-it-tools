# GitHub Actions 工作流：自动构建并部署到 GitHub Pages
# 当推送到 master 分支时自动触发构建和部署

name: Deploy to GitHub Pages

# 触发条件：推送到 master 分支
on:
  push:
    branches:
      - master
  # 支持手动触发
  workflow_dispatch:

# 权限设置：允许读取仓库内容和写入 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 确保只有一个并发部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 设置 Node.js 环境
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 安装依赖
      - name: Install dependencies
        run: npm ci

      # 构建项目（设置 GITHUB_PAGES 环境变量以使用正确的 base 路径）
      - name: Build
        run: GITHUB_PAGES=true npm run build

      # 上传构建产物到 Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
